name: text-embed-fastembed
version: "1"
task: text-embed
description: Encodes text into a dense embedding vector using FastEmbed (BAAI/bge-small-en-v1.5 by default)
port: 8080

inputs:
  - name: text
    datatype: BYTES
    shape: [1]
    description: "Input text to embed"
    required: true

outputs:
  - name: embedding
    datatype: FP32
    shape: [-1]
    description: "Dense embedding vector (dimension depends on the model)"

env:
  EMBED_STEP_EMBED_MODEL: "BAAI/bge-small-en-v1.5"
  EMBED_STEP_MODEL_CACHE_DIR: "/models"
