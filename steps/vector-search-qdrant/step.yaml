name: vector-search-qdrant
version: "1"
task: vector-search
description: Retrieves top-k nearest-neighbour vectors from Qdrant with optional metadata filters.
port: 8080

inputs:
  - name: vector
    datatype: FP32
    shape: [-1]
    description: "Query embedding vector"
    required: true
  - name: top_k
    datatype: INT64
    shape: [1]
    description: "Number of results to return (default: 5)"
    required: false
  - name: filters
    datatype: BYTES
    shape: [1]
    description: "JSON-encoded Qdrant filter dict (optional)"
    required: false

outputs:
  - name: results
    datatype: BYTES
    shape: [1]
    description: "JSON-encoded list of {id, score, metadata} dicts"

env:
  SEARCH_STEP_QDRANT_URL: "http://qdrant:6333"
  SEARCH_STEP_QDRANT_COLLECTION: "transcriptions"
  SEARCH_STEP_DEFAULT_TOP_K: "5"
  SEARCH_STEP_SCORE_THRESHOLD: "0.0"
