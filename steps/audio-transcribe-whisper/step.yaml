name: audio-transcribe-whisper
version: "1"
task: audio-transcribe
description: Transcribes audio files using Whisper ASR Webservice (v1.9.1-cpu)
port: 8080

inputs:
  - name: audio_url
    datatype: BYTES
    shape: [1]
    description: "URL of the audio file to transcribe"
    required: true
  - name: language
    datatype: BYTES
    shape: [1]
    description: "Language hint (e.g. 'en', 'es') or 'auto' for auto-detection"
    required: false
    default: "auto"

outputs:
  - name: transcript
    datatype: BYTES
    shape: [1]
    description: "Full transcription text"
  - name: language
    datatype: BYTES
    shape: [1]
    description: "Detected or requested language code"
  - name: duration
    datatype: FP32
    shape: [1]
    description: "Audio duration in seconds"

env:
  - WHISPER_STEP_WHISPER_URL: "http://whisper:9000"
