name: Publish Catalog and Steps

on:
  push:
    branches:
      - main
    paths:
      - 'steps/**'
      - 'tasks/**'
      - 'scripts/generate_catalog.py'
      - '.github/workflows/publish-catalog.yml'
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io

jobs:
  generate-catalog:
    name: Generate and publish catalog
    runs-on: ubuntu-24.04
    outputs:
      catalog_content: ${{ steps.gen.outputs.catalog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate catalog
        id: gen
        run: |
          uv run python scripts/generate_catalog.py
          catalog_json=$(cat catalog.json)
          echo "catalog=${catalog_json}" >> $GITHUB_OUTPUT

      - name: Create Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            catalog.yaml
            catalog.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog
          path: |
            catalog.yaml
            catalog.json

  publish-steps:
    name: Build and publish step images
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        step_dir:
          - steps/text-embed-fastembed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract step name and version
        id: step
        run: |
          step_name=$(basename ${{ matrix.step_dir }})
          version=$(cat ${{ matrix.step_dir }}/VERSION)
          echo "name=${step_name}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Build and push image
        if: github.event_name == 'release'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.step_dir }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/step-${{ steps.step.outputs.name }}:v${{ steps.step.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/step-${{ steps.step.outputs.name }}:latest

      - name: Build image (non-release)
        if: github.event_name != 'release'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.step_dir }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/step-${{ steps.step.outputs.name }}:v${{ steps.step.outputs.version }}
