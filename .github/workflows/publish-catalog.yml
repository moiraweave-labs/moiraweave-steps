name: Publish Catalog and Steps

on:
  push:
    branches:
      - main
    paths:
      - 'steps/**'
      - 'tasks/**'
      - 'scripts/generate_catalog.py'
      - '.github/workflows/publish-catalog.yml'
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io

jobs:
  generate-catalog:
    name: Generate and publish catalog
    runs-on: ubuntu-24.04
    outputs:
      catalog_content: ${{ steps.gen.outputs.catalog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate catalog
        id: gen
        run: |
          uv run python scripts/generate_catalog.py
          catalog_json=$(jq -c . catalog.json)
          echo "catalog=${catalog_json}" >> "$GITHUB_OUTPUT"

      - name: Create Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            catalog.yaml
            catalog.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v4
        with:
          name: catalog
          path: |
            catalog.yaml
            catalog.json

  prepare-step-matrix:
    name: Discover steps to build
    runs-on: ubuntu-24.04
    outputs:
      step_matrix: ${{ steps.discover.outputs.step_matrix }}
      step_count: ${{ steps.discover.outputs.step_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover step directories
        id: discover
        run: |
          mapfile -t dirs < <(find steps -mindepth 1 -maxdepth 1 -type d | sort)
          selected=()
          for dir in "${dirs[@]}"; do
            if [[ -f "$dir/Dockerfile" && -f "$dir/VERSION" ]]; then
              selected+=("$dir")
            fi
          done

          if [[ ${#selected[@]} -eq 0 ]]; then
            matrix='[]'
          else
            matrix=$(printf '%s\n' "${selected[@]}" | jq -R . | jq -cs .)
          fi

          echo "step_matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "step_count=${#selected[@]}" >> "$GITHUB_OUTPUT"

  publish-steps:
    name: Build and publish step images
    needs: prepare-step-matrix
    if: needs.prepare-step-matrix.outputs.step_count != '0'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        step_dir: ${{ fromJson(needs.prepare-step-matrix.outputs.step_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract step name and version
        id: step
        run: |
          step_name=$(basename ${{ matrix.step_dir }})
          version=$(cat ${{ matrix.step_dir }}/VERSION)
          echo "name=${step_name}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Build and push image
        if: github.event_name == 'release'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.step_dir }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/step-${{ steps.step.outputs.name }}:v${{ steps.step.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/step-${{ steps.step.outputs.name }}:latest

      - name: Build image (non-release)
        if: github.event_name != 'release'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.step_dir }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/step-${{ steps.step.outputs.name }}:v${{ steps.step.outputs.version }}
