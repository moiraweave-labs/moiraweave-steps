name: Step CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "steps/**"
      - "tasks/**"
      - ".github/workflows/step-ci.yml"
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "steps/**"
      - "tasks/**"
      - ".github/workflows/step-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.13"

jobs:
  detect-changed-steps:
    name: Detect changed steps
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      has_changes: ${{ steps.collect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changed-steps matrix
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          chANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" || true)"
          echo "Changed files between ${BASE_SHA} and ${HEAD_SHA}:"
          echo "${CHANGED_FILES}"

          CHANGED_STEPS="$(echo "${CHANGED_FILES}" | awk -F/ '/^steps\/[^/]+\// {print $2}' | sort -u)"

          if [[ -z "${CHANGED_STEPS}" ]]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_JSON="$(python - "${CHANGED_STEPS}" <<'PY'
import json
import pathlib
import sys

steps = [name for name in sys.argv[1].splitlines() if name.strip()]
root = pathlib.Path('steps')
matrix = []
for step in steps:
    version_file = root / step / 'VERSION'
    if not version_file.exists():
        continue
    version = version_file.read_text(encoding='utf-8').strip()
    if not version:
        continue
    matrix.append({'step': step, 'version': version})

print(json.dumps(matrix))
PY
          )"

          if [[ "${MATRIX_JSON}" == "[]" ]]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  step-ci:
    name: Step CI (${{ matrix.step }})
    needs: detect-changed-steps
    if: needs.detect-changed-steps.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changed-steps.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Run step tests
        run: uv run pytest steps/${{ matrix.step }}/tests -q

      - name: Set image name
        id: image
        shell: bash
        run: |
          echo "name=${{ env.REGISTRY }}/${{ github.repository_owner }}/moiraweave-step-${{ matrix.step }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ matrix.version }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: steps/${{ matrix.step }}
          file: steps/${{ matrix.step }}/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push image (push)
        if: github.event_name == 'push'
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: steps/${{ matrix.step }}
          file: steps/${{ matrix.step }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trivy scan (table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.step }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.step }}.sarif
          category: trivy-step-${{ matrix.step }}
